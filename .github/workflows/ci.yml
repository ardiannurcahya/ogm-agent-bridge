name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      PYTHONUNBUFFERED: "1"
      PYTEST_ADDOPTS: "-q"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev --locked
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest -q
      - run: uv build
      - run: uvx twine check dist/*
      - name: Smoke installed wheel
        run: |
          uv venv /tmp/ogm-wheel-venv --python "${{ matrix.python-version }}"
          uv pip install --python /tmp/ogm-wheel-venv/bin/python dist/*.whl
          test "$(/tmp/ogm-wheel-venv/bin/ogm-agent-bridge --version)" = "0.1.0"
