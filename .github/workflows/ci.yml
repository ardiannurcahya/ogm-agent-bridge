name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      PYTEST_ADDOPTS: "-q"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev --locked
      - run: uv run ruff check src tests
      - run: uv run mypy src
      - run: uv run pytest -q
