name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      # v4.1.7
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # v5.0.4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      # v5.0.0
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
      - run: uv sync --dev --locked
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest -q
      - id: version
        name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c "from pathlib import Path; import tomllib; print(tomllib.loads(Path('pyproject.toml').read_text())['project']['version'])")"
          test "$tag" = "$version"
          printf 'value=%s\n' "$version" >> "$GITHUB_OUTPUT"
      - run: uv build
      - run: uvx twine==6.1.0 check dist/*
      - run: sha256sum dist/* > dist/SHA256SUMS
      # v4.6.2
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error

  pypi:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # v4.3.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-dist
          path: dist
      - name: Remove non-package files
        run: rm -f dist/SHA256SUMS
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: uvx twine==6.1.0 upload dist/*.whl dist/*.tar.gz

  github-release:
    needs: [build, pypi]
    if: always() && needs.build.result == 'success' && needs.pypi.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # v4.3.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-dist
          path: dist
      # v2.3.3
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: dist/*
